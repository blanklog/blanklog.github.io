<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 블로그 지수 조회 결과</title>
    <style>
        body { font-family: sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        .accent { color: #03cf5d; font-size: 24px; font-weight: bold; margin: 20px 0; }
        .back-btn { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>블로그 지수 분석 결과</h2>
        <p>조회하신 블로그의 데이터입니다.</p>
        
        <div class="accent">준최적화 5단계</div>
        
        <p style="color: #666; font-size: 14px;">(현재는 화면 테스트용 가상 데이터입니다.)</p>
        <a href="index.html" class="back-btn">← 다른 아이디 검색하기</a>
    </div>
</body>
</html>
