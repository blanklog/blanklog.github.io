<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 리포트 | BrankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117; 
            color: #ecf0f1;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .dashboard-container { width: 100%; max-width: 1100px; display: none; }
        .header-zone { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #21262d; }
        .brand-logo-area { display: flex; align-items: center; gap: 10px; }
        .brand-logo-area img { height: 28px; }
        .brand-text { font-size: 18px; font-weight: 800; color: #ffffff; text-transform: uppercase; }
        .header-meta-line { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 5px; }
        .header-meta-line h2 { font-size: 16px; font-weight: 600; margin: 0; color: #c9d1d9; }
        .timestamp { font-size: 13px; color: #8b949e; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1.1fr 1.2fr; gap: 20px; }
        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 24px; display: flex; flex-direction: column; }
        .card-title { font-size: 14px; font-weight: 600; color: #8b949e; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
        .profile-zone { text-align: center; padding: 10px 0 20px 0; border-bottom: 1px solid #21262d; margin-bottom: 20px; }
        .profile-avatar { width: 50px; height: 50px; background: #21262d; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 10px; }
        .profile-id { font-size: 18px; font-weight: 700; color: #ffffff; margin: 0 0 8px 0; }
        .profile-tag { font-size: 12px; padding: 6px 14px; border-radius: 6px; display: inline-block; font-weight: 500; }

        .meta-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; }
        .stat-box { background: #0d1117; border: 1px solid #21262d; padding: 12px; border-radius: 8px; }
        .stat-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 700; color: #ffffff; }

        .jisu-display { text-align: center; padding: 5px 0; }
        .gauge-subtext { font-size: 12px; color: #8b949e; margin-bottom: 5px; }
        .main-grade-text { font-size: 32px; font-weight: 800; margin: 0 0 20px 0; text-shadow: 0 0 15px rgba(255,255,255,0.1); }
        
        .circle-chart-wrapper { position: relative; width: 130px; height: 130px; margin: 0 auto 15px auto; }
        .circle-chart { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .circle-chart-inner { width: 102px; height: 102px; background: #161b22; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .circle-score { font-size: 24px; font-weight: 800; color: #ffffff; }
        .circle-label { font-size: 11px; color: #8b949e; }
        
        .analysis-status-badge { font-size: 12px; color: #8b949e; background: #0d1117; padding: 6px 14px; border-radius: 8px; border: 1px solid #21262d; display: inline-block; margin-bottom: 20px; }
        .formula-notice-box { background: #0d1117; border: 1px dashed #30363d; border-radius: 10px; padding: 14px 16px; text-align: left; margin-top: auto; }
        .formula-title { font-size: 11px; font-weight: 700; color: #8b949e; margin: 0 0 6px 0; }
        .formula-text { font-size: 11px; color: #6e7681; line-height: 1.5; margin: 0; word-break: keep-all; }

        .post-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .post-item { display: flex; align-items: center; gap: 12px; background: #0d1117; padding: 14px 16px; border-radius: 10px; border: 1px solid #21262d; }
        .post-badge { background: #21262d; font-size: 12px; font-weight: 700; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .post-content { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        .post-content a { color: #c9d1d9; text-decoration: none; font-weight: 500; }

        .actions-zone { margin-top: 30px; text-align: center; }
        .back-btn { display: inline-block; padding: 12px 24px; background: #21262d; color: #c9d1d9; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; border: 1px solid #30363d; }
        
        .loader-wrapper { text-align: center; padding: 60px 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div id="spinner" class="spinner"></div>
        <b id="loaderText" style="color: #8b949e; font-size: 15px;">실시간 빅데이터 지표 분석 중...</b>
    </div>

    <div id="dashboard" class="dashboard-container">
        <div class="header-zone">
            <div class="brand-logo-area">
                <img src="logo.svg" alt="BrankLog Logo">
                <span class="brand-text">Brank<span style="color: #03cf5d;">Log.</span></span>
            </div>
            <div class="header-meta-line">
                <h2><span id="headerId">-</span> 님 <span id="reportTypeTitle">채널</span> 분석 리포트</h2>
                <div id="currentTime" class="timestamp">-</div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <p class="card-title">ℹ️ 채널 상세 정보</p>
                <div class="profile-zone">
                    <div id="profileIcon" class="profile-avatar">📁</div>
                    <p id="displayId" class="profile-id">-</p>
                    <span id="channelTag" class="profile-tag">-</span>
                </div>
                <div class="meta-stats">
                    <div class="stat-box">
                        <div class="stat-label">데이터 모델</div>
                        <div id="dataSourceLabel" class="stat-value" style="font-size: 13px;">-</div>
                    </div>
                    <div class="stat-box">
                        <div id="statBoxTitle" class="stat-label">핵심 지표</div>
                        <div id="statBoxValue" class="stat-value">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <p class="card-title">📈 종합 지수 시뮬레이션</p>
                <div class="jisu-display">
                    <p class="gauge-subtext">종합 도달 가중치 판정</p>
                    <p id="mainGrade" class="main-grade-text">-</p>
                    
                    <div class="circle-chart-wrapper">
                        <div id="circleChart" class="circle-chart">
                            <div class="circle-chart-inner">
                                <span id="circleScore" class="circle-score">0점</span>
                                <span id="scoreLabel" class="circle-label">가중치</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="analysis-status-badge">
                        분석 상태 판정: <span id="statusText" style="font-weight:700;">정상</span>
                    </div>
                </div>

                <div class="formula-notice-box">
                    <p id="formulaTitle" class="formula-title">📋 가중치 산출 근거 안내</p>
                    <p id="formulaText" class="formula-text">-</p>
                </div>
            </div>

            <div class="card">
                <p id="rightCardTitle" class="card-title">🔥 핵심 추적 데이터</p>
                <ul id="dataContainer" class="post-list"></ul>
            </div>
        </div>

        <div class="actions-zone">
            <a href="index.html" class="back-btn">← 다른 아이디 조회하기</a>
        </div>
    </div>

    <script>
        const now = new Date();
        const formattedDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        document.getElementById('currentTime').innerText = formattedDate;

        const urlParams = new URLSearchParams(window.location.search);
        const searchType = urlParams.get('type') || 'naver';
        const rawId = urlParams.get('id');
        const targetId = rawId ? decodeURIComponent(rawId) : null;

        if (!targetId) {
            document.getElementById('loader').innerHTML = "<span style='color:#ff6b6b; font-weight:bold;'>올바른 계정 ID가 전달되지 않았습니다.</span>";
        } else {
            document.getElementById('displayId').innerText = targetId;
            document.getElementById('headerId').innerText = targetId;
            
            if (searchType === 'naver') {
                document.getElementById('spinner').style.borderLeftColor = "#03cf5d";
                document.getElementById('loaderText').innerText = "네이버 블로그 실시간 빅데이터 지표 분석 중...";
                fetchNaverData(targetId);
            } else {
                document.getElementById('spinner').style.borderLeftColor = "#cc2366";
                document.getElementById('loaderText').innerText = "인스타그램 도달 및 해시태그 가중치 시뮬레이션 중...";
                fetchInstagramData(targetId);
            }
        }

        // [1] 네이버 실시간 파싱 엔진
        async function fetchNaverData(id) {
            const proxyUrl = "https://corsproxy.io/?";
            const targetUrl = encodeURIComponent(`https://rss.blog.naver.com/${id}.xml`);
            try {
                const response = await fetch(proxyUrl + targetUrl);
                if (!response.ok) throw new Error();
                const textData = await response.text();
                const xmlDoc = new DOMParser().parseFromString(textData, "text/xml");
                
                const channelDoc = xmlDoc.getElementsByTagName("channel")[0];
                let blogTitle = "네이버 블로그";
                if (channelDoc && channelDoc.getElementsByTagName("title")[0]) {
                    blogTitle = channelDoc.getElementsByTagName("title")[0].textContent.replace(" : 네이버 블로그", "").trim();
                }

                const items = xmlDoc.getElementsByTagName("item");
                let activeMonthPosts = 0;
                let totalTitleLength = 0;
                let dates = [];
                let postHtml = "";
                const thirtyDaysAgo = new Date();
                thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

                for (let i = 0; i < Math.min(items.length, 5); i++) {
                    const title = items[i].getElementsByTagName("title")[0].textContent;
                    const link = items[i].getElementsByTagName("link")[0].textContent;
                    const pDate = new Date(items[i].getElementsByTagName("pubDate")[0].textContent);
                    totalTitleLength += title.length;
                    dates.push(pDate);
                    if (pDate >= thirtyDaysAgo) activeMonthPosts++;

                    postHtml += `<li class="post-item"><div class="post-badge" style="color:#03cf5d;">${i+1}</div><div class="post-content"><a href="${link}" target="_blank">${title}</a></div></li>`;
                }

                if (items.length === 0) throw new Error();

                // 점수 가중치 실시간 연산
                let score = 15;
                if (activeMonthPosts >= 6) score += 40;
                else if (activeMonthPosts >= 3) score += 30;
                else if (activeMonthPosts >= 1) score += 15;

                if ((totalTitleLength / Math.min(items.length, 5)) >= 25) score += 25;
                else score += 15;

                if (dates.length >= 2 && (Math.abs(dates[0] - dates[1]) / (1000*60*60*24)) <= 5) score += 20;
                else score += 10;

                renderUI('naver', blogTitle, "실시간 네이버 RSS", "당월 활성 포스팅", `${activeMonthPosts}개`, score, postHtml);
            } catch (e) {
                // 네이버 지연 시 리얼 55점 안전장치
                renderUI('naver', "네이버 블로그", "실시간 네이버 RSS", "당월 활성 포스팅", "지연", 55, `<li class="post-item"><div class="post-badge">!</div><div class="post-content"><a href="https://blog.naver.com/${id}" target="_blank">네이버 RSS 통로 지연 (블로그 직접 홈 가기)</a></div></li>`);
            }
        }

        // [2] 인스타그램 알고리즘 시뮬레이션 엔진
        function fetchInstagramData(id) {
            setTimeout(() => {
                // 계정 특성을 기하학적으로 연산하는 난수 알고리즘 결합
                let seed = id.length * 7;
                for (let i = 0; i < id.length; i++) seed += id.charCodeAt(i);
                
                let baseScore = 40 + (seed % 45); 
                let hashtagWeight = 10 + (seed % 21);
                let interactionRate = ((5 + (seed % 120) / 10)).toFixed(1);

                let grade = "분석 일반";
                let themeColor = "#cc2366";
                if (baseScore >= 80) { grade = "최적화 등급"; themeColor = "#bc1888"; }
                else if (baseScore >= 60) { grade = "준최 최상위"; themeColor = "#dc2743"; }
                else if (baseScore >= 45) { grade = "준최 등급"; themeColor = "#e6683c"; }

                let mockTags = ["#일상", "#소통", "#디자인", "#인플루언서", "#브랜딩"];
                let tagHtml = "";
                mockTags.forEach((tag, idx) => {
                    let tagPower = (hashtagWeight - idx * 2) + (seed % 3);
                    tagHtml += `<li class="post-item"><div class="post-badge" style="color:#cc2366;">#</div><div class="post-content" style="color:#c9d1d9; font-weight:500;">${tag} <span style="color:#6e7681; font-size:12px; float:right;">확산 가중치 +${tagPower}%</span></div></li>`;
                });

                renderUI('insta', "인스타그램 프로필", "인스타 가중 알고리즘", "예상 상호작용 비율", `ER ${interactionRate}%`, baseScore, tagHtml, grade, themeColor);
            }, 800);
        }

        // UI 렌더링 총괄 함수
        function renderUI(type, greeting, source, statTitle, statVal, score, listHtml, customGrade, customColor) {
            document.getElementById('reportTypeTitle').innerText = type === 'naver' ? '블로그' : '인스타그램';
            document.getElementById('profileIcon').innerText = type === 'naver' ? '📁' : '📸';
            document.getElementById('channelTag').innerText = greeting;
            document.getElementById('dataSourceLabel').innerText = source;
            document.getElementById('statBoxTitle').innerText = statTitle;
            document.getElementById('statBoxValue').innerText = statVal;
            
            const mainColor = type === 'naver' ? '#03cf5d' : (customColor || '#cc2366');
            document.getElementById('channelTag').style.color = mainColor;
            document.getElementById('channelTag').style.border = `1px solid ${mainColor}40`;
            document.getElementById('channelTag').style.background = `${mainColor}10`;

            let gradeName = "";
            if (type === 'naver') {
                if (score >= 80) gradeName = "최적화 등급";
                else if (score >= 55) gradeName = "준최 최상위";
                else if (score >= 35) gradeName = "준최 등급";
                else gradeName = "분석 일반";
            } else {
                gradeName = customGrade;
            }

            const gradeTextElement = document.getElementById('mainGrade');
            gradeTextElement.innerText = gradeName;
            gradeTextElement.style.color = mainColor;
            gradeTextElement.style.textShadow = `0 0 15px ${mainColor}40`;

            document.getElementById('circleScore').innerText = `${score}점`;
            document.getElementById('circleScore').style.color = '#ffffff';
            document.getElementById('circleChart').style.background = `conic-gradient(${mainColor} 0% ${score}%, #21262d ${score}% 100%)`;
            
            document.getElementById('statusText').innerText = "정상 판정 완료";
            document.getElementById('statusText').style.color = mainColor;

            if (type === 'naver') {
                document.getElementById('rightCardTitle').innerText = "🔥 최근 핵심 분석 포스팅";
                document.getElementById('formulaTitle').innerText = "📋 블로그 지수 산출 근거 안내";
                document.getElementById('formulaText').innerText = "본 지표는 포털 공식 최고 지수와는 무관합니다. 최근 30일 이내 당월 포스팅 업로드 빈도(Volume), 발행 주기 성실도(Frequency), 제목 가중치를 실시간 연산하여 도출한 활성 점수입니다.";
            } else {
                document.getElementById('rightCardTitle').innerText = "✨ 추천 핵심 시뮬레이션 해시태그";
                document.getElementById('formulaTitle').innerText = "📋 인스타 확산 가중치 산출 근거 안내";
                document.getElementById('formulaText').innerText = "본 지표는 계정 ID의 텍스트 밀도와 시간 밀도를 기반으로 가상의 도달 범위 및 해시태그 확산 파워를 기하학적 난수 매칭으로 시뮬레이션한 가이드용 참고 점수입니다.";
            }

            document.getElementById('dataContainer').innerHTML = listHtml;
            
            document.getElementById('loader').style.display = "none";
            document.getElementById('dashboard').style.display = "block";
        }
    </script>
</body>
</html>
