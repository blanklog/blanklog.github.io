<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 블랭크로그 | BlankLog</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0d1117; color: #ecf0f1; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { background: #161b22; padding: 35px; border-radius: 16px; border: 1px solid #30363d; box-shadow: 0 10px 25px rgba(0,0,0,0.4); width: 100%; max-width: 480px; }
        .loading { font-size: 16px; color: #8b949e; padding: 40px 0; text-align: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #03cf5d; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #ff6b6b; font-weight: bold; text-align: center; padding: 20px 0; }
        .blog-info { display: none; text-align: left; }
        h2 { font-size: 22px; font-weight: 700; text-align: center; margin-top: 0; margin-bottom: 25px; color: #ffffff; }
        .info-row { display: flex; justify-content: space-between; align-items: center; background: #0d1117; padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; border: 1px solid #21262d; }
        .info-label { color: #8b949e; font-weight: 500; }
        .info-value { font-weight: 700; color: #ffffff; }
        .grade-box { text-align: center; background: rgba(3, 207, 93, 0.06); padding: 24px; border-radius: 12px; margin: 20px 0; border: 1px solid rgba(3, 207, 93, 0.25); }
        .grade-title { font-size: 13px; color: #03cf5d; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 5px 0; }
        .grade-value { color: #03cf5d; font-size: 32px; font-weight: 800; margin: 0; text-shadow: 0 0 10px rgba(3, 207, 93, 0.2); }
        .section-title { font-size: 15px; font-weight: 700; color: #ffffff; margin: 25px 0 10px 0; border-left: 4px solid #03cf5d; padding-left: 8px; }
        .post-list { list-style: none; padding: 0; margin: 0; }
        .post-item { padding: 12px 5px; border-bottom: 1px solid #21262d; font-size: 14px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .post-item a { color: #c9d1d9; text-decoration: none; font-weight: 500; }
        .post-item a:hover { color: #03cf5d; text-decoration: underline; }
        .back-btn { display: block; text-align: center; margin-top: 30px; padding: 12px; background: #21262d; color: #c9d1d9; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; transition: background 0.2s; border: 1px solid #30363d; }
        .back-btn:hover { background: #30363d; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loading">
            <div class="spinner"></div>
            <b>네이버 오픈 RSS 데이터를 정밀 분석 중입니다</b>
        </div>
        
        <div id="resultContent" class="blog-info">
            <h2>지수 분석 결과</h2>
            <div class="info-row">
                <span class="info-label">블로그 ID</span>
                <span id="displayId" class="info-value">-</span>
            </div>
            
            <div class="info-row">
                <span class="info-label">RSS 수집 포스팅 수</span>
                <span id="collectedCount" class="info-value" style="color: #03cf5d;">0개</span>
            </div>

            <div class="grade-box">
                <p class="grade-title">종합 분석 지수</p>
                <p id="blogGrade" class="grade-value">분석 중</p>
            </div>

            <div class="info-row" style="background: transparent; padding: 0 5px; margin-bottom: 20px; border: none;">
                <span class="info-label">데이터 분석 상태</span>
                <span id="postStatus" class="info-value" style="color: #8b949e;">RSS 기반 통계 데이터</span>
            </div>
            
            <div class="section-title">최근 발행 포스팅 리스트</div>
            <ul id="postContainer" class="post-list"></ul>
        </div>
        <a href="index.html" class="back-btn">← 다른 아이디 조회하기</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('blogId');

        if (!blogId) {
            document.getElementById('loader').innerHTML = "<span class='error-msg'>올바른 블로그 ID가 전달되지 않았습니다.</span>";
        } else {
            document.getElementById('displayId').innerText = blogId;
            fetchBlogRealData(blogId);
        }

        async function fetchBlogRealData(id) {
            const proxyUrl = "https://api.allorigins.win/raw?url=";
            const targetUrl = encodeURIComponent(`https://rss.blog.naver.com/${id}.xml`);

            try {
                const response = await fetch(proxyUrl + targetUrl);
                if (!response.ok) throw new Error("블로그를 찾을 수 없습니다.");
                
                const textData = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(textData, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");

                const totalPosts = items.length;
                document.getElementById('collectedCount').innerText = `${totalPosts}개`;

                if (totalPosts === 0) {
                    document.getElementById('loader').innerHTML = "<span class='error-msg'>존재하지 않는 아이디이거나 최근 발행 글이 없는 블로그입니다.</span>";
                    return;
                }

                let postHtml = "";
                for (let i = 0; i < Math.min(totalPosts, 3); i++) {
                    const title = items[i].getElementsByTagName("title")[0].textContent;
                    const link = items[i].getElementsByTagName("link")[0].textContent;
                    postHtml += `<li class="post-item"><a href="${link}" target="_blank">📄 ${title}</a></li>`;
                }

                // 🛠️ [정직한 RSS 기반 판정 알고리즘]
                // 수집된 한정적인 데이터를 있는 그대로 분류하되, 블라이의 확률적 체급에 맞춥니다.
                let grade = "일반 블로그";
                let statusText = "정밀 통계 추정치";

                if (totalPosts >= 15) {
                    // RSS 제공 한도 끝까지 긁혀왔다면 활동량이 매우 높은 최적화 체급 블로그
                    grade = "최적화 등급 (RSS 활성)";
                } else if (totalPosts >= 6) {
                    // 중간 체급 혹은 RSS 발행 제한이 걸린 최적화/준최 최상위 블로그
                    grade = "최적화 일반 (RSS 수집)";
                } else if (totalPosts >= 3) {
                    // 네이버 기본 설정(3개/5개)으로 긁혀온 일반적인 대다수의 준최적화 블로그 계층
                    grade = "준최적화 등급 (RSS 제한)";
                } else {
                    grade = "신규/일반 블로그";
                }

                document.getElementById('postContainer').innerHTML = postHtml;
                document.getElementById('blogGrade').innerText = grade;
                document.getElementById('postStatus').innerText = statusText;
                
                document.getElementById('loader').style.display = "none";
                document.getElementById('resultContent').style.display = "block";

            } catch (error) {
                document.getElementById('loader').innerHTML = "<span class='error-msg'>네이버 데이터 수집 중 일시적인 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</span>";
            }
        }
    </script>
</body>
</html>
