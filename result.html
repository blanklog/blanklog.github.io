        .info-value { font-weight: 700; color: #222; }
        .grade-box { text-align: center; background: #eafbf1; padding: 24px; border-radius: 12px; margin: 20px 0; border: 1px solid #cbf3db; }

        .post-item a { color: #333; text-decoration: none; font-weight: 500; }
        .post-item a:hover { color: #03cf5d; text-decoration: underline; }
        .back-btn { display: block; text-align: center; margin-top: 30px; padding: 12px; background: #f1f3f5; color: #495057; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; transition: background 0.2s; }
        .back-btn:hover { background: #e9ecef; }
