<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 블로그 지수 분석기 브랭크로그 | BrankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117; 
            color: #ecf0f1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            text-align: center;
            width: 100%;
            max-width: 460px;
            padding: 40px 24px;
            box-sizing: border-box;
        }

        .brand-logo-zone {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .brand-logo-zone img {
            height: 45px;
            width: auto;
            display: block;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            margin: 0;
            text-transform: uppercase;
        }

        .brand-title span {
            color: #03cf5d; 
        }

        .brand-tagline {
            font-size: 14px;
            color: #8b949e;
            margin-top: 5px;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .input-group {
            position: relative;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 6px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group:focus-within {
            border-color: #03cf5d;
            box-shadow: 0 0 0 3px rgba(3, 207, 93, 0.15);
        }

        .input-group input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
            padding: 12px 16px;
            font-weight: 500;
        }

        .input-group input::placeholder {
            color: #484f58;
        }

        .submit-btn {
            background-color: #03cf5d;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            background-color: #02b34f;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .info-tip {
            margin-top: 25px;
            font-size: 12px;
            color: #6e7681;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="brand-logo-zone">
            <img src="logo.svg" alt="BrankLog Logo">
            <h1 class="brand-title">Brank<span>Log.</span></h1>
        </div>
        <p class="brand-tagline">네이버 블로그 실시간 빅데이터 지수 분석 플랫폼</p>

        <form id="searchForm" onsubmit="navigateToResult(event)">
            <div class="input-group">
                <input type="text" id="blogIdInput" placeholder="네이버 블로그 아이디 입력" required autocomplete="off">
                <button type="submit" class="submit-btn">분석하기</button>
            </div>
        </form>

        <p class="info-tip">
            아이디 입력 시 해당 블로그의 최근 30일 활성 데이터 스코어 및<br>
            종합 노출 가중치 리포트를 실시간으로 파싱하여 제공합니다.
        </p>
    </div>

    <script>
        function navigateToResult(event) {
            event.preventDefault();
            const blogId = document.getElementById('blogIdInput').value.trim();
            if (blogId) {
                window.location.href = `result.html?blogId=${encodeURIComponent(blogId)}`;
            }
        }
    </script>
</body>
</html>
