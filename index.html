<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랭크로그 | BrankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }
        .brand-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }
        .main-sub {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 35px;
        }
        .search-section {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }
        .input-group {
            text-align: left;
        }
        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: #8b949e; 
            margin-bottom: 12px;
            display: block;
        }
        .search-box {
            display: flex;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 6px;
            align-items: center;
        }
        .search-box input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            padding: 10px 12px;
            font-size: 15px;
        }
        .search-box input::placeholder {
            color: #484f58;
        }
        .btn-naver {
            background: #03cf5d;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-naver:hover {
            opacity: 0.9;
        }
        .footer-notice {
            font-size: 11px;
            color: #6e7681;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="brand-text">Brank<span style="color: #03cf5d;">Log.</span></h1>
        <p class="main-sub">네이버 블로그 지수 및 플레이스 마케팅 가중치 분석 플랫폼</p>

        <div class="search-section">
            <div class="input-group">
                <span class="input-label">블로그 지수 및 지도 키워드 통합 분석 (Naver)</span>
                <div class="search-box">
                    <input type="text" id="blogId" placeholder="네이버 식별 ID 입력" onkeypress="if(event.keyCode==13) startAnalysis()">
                    <button class="btn-naver" onclick="startAnalysis()">분석하기</button>
                </div>
            </div>
        </div>

        <p class="footer-notice">
            계정 ID 입력 시 해당 채널의 최근 활성 데이터 스코어 리포트 및<br>
            플레이스·키워드 노출 적합성 가중치를 실시간 연산하여 제공합니다.
        </p>
    </div>

    <script>
        function startAnalysis() {
            const id = document.getElementById('blogId').value.trim();
            if (!id) return alert('네이버 계정 ID를 입력해주세요.');
            // 🔑 직전에 드린 플레이스·키워드 대응판 result.html 규격에 한 치의 오차도 없이 이름표 매칭
            location.href = `result.html?blogId=${encodeURIComponent(id)}`;
        }
    </script>
</body>
</html>
