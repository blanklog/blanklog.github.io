<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브랭크로그 | BrankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
            text-align: center;
        }
        .logo-box {
            margin-bottom: 10px;
        }
        .logo-box img {
            height: 32px;
            margin-bottom: 5px;
        }
        .brand-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }
        .main-sub {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 40px;
        }
        .search-section {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }
        /* 🎨 두 타이틀 문구의 규격을 칼같이 일치시키는 클래스 */
        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: #8b949e; /* 미니멀한 UI를 위해 톤다운된 고급스러운 회색으로 통일 */
            margin-bottom: 10px;
            display: block;
            line-height: 1.5;
            word-break: keep-all;
        }
        .search-box {
            display: flex;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 6px;
            align-items: center;
        }
        .search-box input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            padding: 10px 12px;
            font-size: 14px;
        }
        .search-box input::placeholder {
            color: #484f58;
        }
        .btn-naver {
            background: #03cf5d;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-naver:hover, .btn-insta:hover {
            opacity: 0.9;
        }
        .divider {
            border: none;
            border-top: 1px dashed #30363d;
            margin: 25px 0;
        }
        .footer-notice {
            font-size: 11px;
            color: #6e7681;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-box">
            <img src="logo.svg" alt="BrankLog Logo">
            <h1 class="brand-text">Brank<span style="color: #03cf5d;">Log.</span></h1>
        </div>
        <p class="main-sub">네이버 블로그 및 인스타그램 실시간 빅데이터 지수 분석 플랫폼</p>

        <div class="search-section">
            <div class="input-group">
                <span class="input-label">블로그 지수 분석 (Naver)</span>
                <div class="search-box">
                    <input type="text" id="naverId" placeholder="네이버 블로그 아이디 입력" onkeypress="if(event.keyCode==13) targetSearch('naver')">
                    <button class="btn-naver" onclick="targetSearch('naver')">분석하기</button>
                </div>
            </div>

            <div class="divider"></div>

            <div class="input-group">
                <span class="input-label
