<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 블랭크로그 | BlankLog</title>
    <style>
        /* 🎨 노란색 컬러 포인트 수정 구역 - 로고 색상에 맞춰 요리조리 조절하세요 */
        :root {
            --point-color: #FFD700;       /* 기본 노란색 포인트 */
            --point-hover-color: #E6C200; /* 버튼 마우스 호버 시 살짝 어두운 노란색 */
            --bg-color: #0d1117;          /* 깊이감 있는 딥블랙 배경 */
            --card-bg-color: #161b22;     /* 카드 레이아웃 배경 */
            --border-color: #30363d;      /* 세련된 다크 그레이 라인 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-container {
            background: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        .brand-header {
            margin-bottom: 35px;
        }

        .main-logo-area {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .main-logo-area img {
            height: 45px;
            width: auto;
            display: block;
        }

        .brand-text {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .sub-copy {
            font-size: 14px;
            color: #8b949e;
            margin: 10px 0 0 0;
            font-weight: 400;
            line-height: 1.4;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 25px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* 🛠️ 입력창 포커싱 시 노란색 라인 효과 적용 */
        input:focus {
            outline: none;
            border-color: var(--point-color);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.15);
        }

        input::placeholder {
            color: #484f58;
        }

        /* 🛠️ 조회 버튼을 상큼한 노란색으로 수술 완료! */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: var(--point-color); /* 노란색 배경 */
            color: #0d1117;                  /* 글자는 어둡게 빼서 가독성 확보 */
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--point-hover-color);
        }

        button:active {
            transform: scale(0.98);
        }

        .notice-text {
            margin-top: 25px;
            font-size: 12px;
            color: #484f58;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="brand-header">
            <div class="main-logo-area">
                <img src="logo.svg" alt="BlankLog Logo">
            </div>
            <h1 class="brand-text">Blank<span style="color: var(--point-color);">Log.</span></h1>
            <p class="sub-copy">네이버 블로그 실시간 빅데이터<br>지수 및 당월 노출 가중치 분석기</p>
        </div>

        <div class="search-box">
            <div class="input-wrapper">
                <input type="text" id="blogIdInput" placeholder="네이버 블로그 ID를 입력하세요" onkeypress="if(event.keyCode==13) startAnalysis();">
            </div>
            <button onclick="startAnalysis()">실시간 지수 분석 개시</button>
        </div>

        <p class="notice-text">
            ※ 본 프로그램은 네이버 오픈 데이터 프로토콜을 실시간으로 디코딩하여 최근 30일간의 활동 지표를 엄격하게 다차원 연산합니다.
        </p>
    </div>

    <script>
        function startAnalysis() {
            const rawInput = document.getElementById("blogIdInput").value.trim();
            if (!rawInput) {
                alert("분석하려는 네이버 블로그 ID를 입력해주세요.");
                return;
            }
            let finalId = rawInput;
            if (rawInput.includes("blog.naver.com/")) {
                const parts = rawInput.split("blog.naver.com/");
                finalId = parts[1].split("/")[0].split("?")[0];
            } else if (rawInput.includes("naver.com/")) {
                const parts = rawInput.split("naver.com/");
                finalId = parts[1].split("/")[0].split("?")[0];
            }
            window.location.href = `result.html?blogId=${encodeURIComponent(finalId)}`;
        }
    </script>
</body>
</html>
