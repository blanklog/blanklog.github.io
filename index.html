<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 지수 분석 블랭크로그 | BlankLog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117; /* 세련된 딥 블랙 */
            color: #ecf0f1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-wrapper {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .brand-zone {
            text-align: center;
            margin-bottom: 40px;
        }

        /* 블랙 배경에 대비되는 플랫한 라인 심볼 */
        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background-color: #161b22;
            border: 2px solid #03cf5d;
            border-radius: 14px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(3, 207, 93, 0.15);
        }

        .brand-logo svg {
            width: 26px;
            height: 26px;
            stroke: #03cf5d;
            stroke-width: 2.5;
            fill: none;
        }

        .brand-zone h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
            color: #ffffff;
        }

        .brand-zone p {
            font-size: 14px;
            color: #8b949e;
            margin: 0;
        }

        .search-container {
            background: #161b22; /* 컨테이너 다크화 */
            padding: 32px 24px;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #8b949e;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 16px 16px 44px;
            border: 1.5px solid #30363d;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            background-color: #0d1117;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #03cf5d;
            box-shadow: 0 0 0 4px rgba(3, 207, 93, 0.15);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #8b949e;
            display: flex;
            align-items: center;
        }

        .input-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            background-color: #03cf5d;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(3, 207, 93, 0.2);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #02b852;
            transform: translateY(-1px);
        }

        .footer-notice {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #484f58;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="brand-zone">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    <path d="M10 7v6m3-3h-6"></path>
                </svg>
            </div>
            <h1>블로그 지수 분석기</h1>
            <p>네이버 블로그의 실시간 등급과 상태를 조회합니다</p>
        </div>

        <div class="search-container">
            <form action="result.html" method="GET">
                <div class="input-group">
                    <label for="blogId">네이버 블로그 아이디</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <input type="text" id="blogId" name="blogId" placeholder="ex) naver_id" required autocomplete="off">
                    </div>
                </div>
                <button type="submit">실시간 지수 조회하기</button>
            </form>
        </div>

        <div class="footer-notice">
            본 서비스는 블로그 RSS 데이터를 기반으로 작동하는 공개 분석 도구입니다.<br>
            © blanklog. All rights reserved.
        </div>
    </div>
</body>
</html>
